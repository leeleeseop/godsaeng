<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
<h1>로그인</h1>

<div th:if="${param.error}">
    <p style="color:red;">로그인 실패: 아이디 또는 비밀번호가 올바르지 않습니다.</p>
</div>

<form th:action="@{/member/login}" method="post">
    <label for="memberId">아이디</label><br>
    <input type="text" id="memberId" name="memberId" required><br><br>

    <label for="memberPw">비밀번호</label><br>
    <input type="password" id="memberPw" name="memberPw" required><br><br>

    <button type="submit">로그인</button>
</form>

<p>
    <a th:href="@{/member/join}">회원가입</a> |
    <a th:href="@{/member/findId}">아이디 찾기</a> |
    <a th:href="@{/member/resetPw}">비밀번호 재설정</a>
</p>
</body>
</html>
